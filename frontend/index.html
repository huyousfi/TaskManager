<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Advanced Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-title">
        <h1>TaskFlow</h1>
        <h2>Stay organized. Stay Productive.</h2>
    </div>
    <div class="app">
            <div class="sidebar">
            <h1>Add New Task</h1>
            <input
            type="text"
            id="todoInput"
            placeholder="Enter a new todo....."
            >
            <button id="addBtn">Add</button>
            <br><br><br>
            <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
        
        <div class="content">
            <h2>Your Tasks</h2>
            <ul id="todoList">
            </ul>
        </div> 
    </div>
    <script src="script.js"></script>
</body>
</html>
